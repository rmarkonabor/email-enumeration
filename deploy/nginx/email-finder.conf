# /etc/nginx/sites-available/email-finder
#
# Replace `email-finder.yourdomain.com` with your real subdomain, then:
#   sudo ln -s /etc/nginx/sites-available/email-finder /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d email-finder.yourdomain.com   # for HTTPS

server {
    listen 80;
    server_name email-finder.yourdomain.com;

    # Adjust if you put it behind Cloudflare etc.
    real_ip_header X-Forwarded-For;

    # Reasonable client body limit; batch requests are small JSON
    client_max_body_size 256k;

    location / {
        proxy_pass         http://127.0.0.1:8000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # SMTP work can be slow; allow long-ish timeouts for batch endpoints
        proxy_connect_timeout 10s;
        proxy_send_timeout    120s;
        proxy_read_timeout    120s;
    }

    # Optional: deny everything that isn't a known route, lightly
    location ~ ^/(\.|\.git|wp-) {
        return 404;
    }
}
